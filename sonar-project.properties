# SonarCloud configuration for first-frontend.
# projectKey / organization must match what you create in SonarCloud
# (organization = your SonarCloud org slug; projectKey is usually org_repo).
sonar.projectKey=navike21_first-frontend
sonar.organization=navike21
sonar.projectName=first-frontend

# Analyzed code lives under src/; tests are identified by their suffix.
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Files excluded from analysis entirely (generated, barrels, pure data, stories).
sonar.exclusions=**/*.stories.tsx,**/*.d.ts,src/**/index.ts,src/**/index.tsx,src/**/i18n/locales/**,dist/**,coverage/**

# Files kept in analysis but excluded from coverage metrics (type-only / config).
sonar.coverage.exclusions=**/*.types.ts,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/*.stories.tsx,src/**/index.ts,src/**/i18n/**,src/vite-env.d.ts

# Coverage report produced by `pnpm test:coverage` (lcov reporter).
sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8
